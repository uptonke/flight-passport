            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-xs text-gray-400 mb-1">機型</label><input type="text" id="inp-type" class="w-full bg-white/10 border border-white/10 rounded-lg px-3 py-2"></div>

            </div>

            <div>
                <label class="block text-xs text-gray-400 mb-1">飛行時間</label>
                <div class="flex gap-2">
                    <input type="number" id="inp-hh" placeholder="h" class="w-1/2 bg-white/10 border border-white/10 rounded-lg px-3 py-2 text-center" min="0">
                    <input type="number" id="inp-mm" placeholder="m" class="w-1/2 bg-white/10 border border-white/10 rounded-lg px-3 py-2 text-center" min="0" max="59">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">艙等 (Class)</label>
                    <select id="inp-seat-class" class="w-full bg-[#1e1e20] border border-white/10 rounded-lg px-3 py-2 text-white">
                        <option value="">未指定</option>
                        <option value="Economy">經濟艙 (Economy)</option>
                        <option value="Premium Economy">豪華經濟艙 (Premium)</option>
                        <option value="Business">商務艙 (Business)</option>
                        <option value="First Class">頭等艙 (First)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">座位位置</label>
                    <select id="inp-seat-type" class="w-full bg-[#1e1e20] border border-white/10 rounded-lg px-3 py-2 text-white">
                        <option value="">未指定</option>
                        <option value="Window">靠窗 (Window)</option>
                        <option value="Middle">中間 (Middle)</option>
                        <option value="Aisle">走道 (Aisle)</option>
                    </select>
                </div>
            </div>
            <div class="flex items-center pt-2">
                <input type="checkbox" id="inp-exit-row" class="w-4 h-4 rounded bg-white/10 border border-white/10 text-sky-500 cursor-pointer">

            </div>
            <button type="submit" id="submitBtn" class="w-full bg-sky-500 hover:bg-sky-400 text-black font-bold py-3 rounded-xl mt-4">寫入護照</button>
        </form>
    </div>

    // 🔥 航班號自動拆解引擎 (輸入 BR87 自動拆成 BR 與 87)
   // 🔥 升級版：智慧航班號拆解引擎 (支援雙向輸入防呆)
    function smartSplitFlight(e) {
        let val = e.target.value.toUpperCase().replace(/\s/g, '');
        
        // 防呆：如果是純數字 (如 87 或 1234)，代表純粹是航班號，絕對不執行拆解
        if (/^[0-9]{1,4}[A-Z]?$/.test(val)) return;

        let match = val.match(/^([A-Z0-9]{2,3})([0-9]{1,4}[A-Z]?)$/);
        if (match) {
            document.getElementById('inp-airline').value = match[1];
            document.getElementById('inp-flight-number').value = match[2];
        }
    }

    function formatTimeString(decimalHrs) {
        if(!decimalHrs) return '0h 0m';
        const h = Math.floor(decimalHrs);
        const m = Math.round((decimalHrs - h) * 60);
        return `${h}h ${m}m`;
    }

    function getAirlineLogoUrl(iataCode) {
        if (!iataCode || iataCode.length !== 2) return null;

    function getRouteColor(count) {
        if(count === 1) return '#facc15';
        if(count === 2) return '#3b82f6';
        if(count === 3) return '#22c55e';
        if(count === 4) return '#000000';
        if(count === 5) return '#ef4444';
        if(count === 6) return '#f97316';
        return '#ffffff';
    }

   // 🔥 加入中文名稱與 datalist 支援 (升級版：智慧合併中英雙語與髒資料修正)

    mapboxgl.accessToken = MAPBOX_TOKEN;
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    map.on('style.load', () => map.setFog({ "color": "rgb(24, 24, 26)", "high-color": "rgb(36, 36, 39)", "space-color": "rgb(0, 0, 0)", "star-intensity": 0.5 }));

    function filterByYear(year) {
        currentYearFilter = year;
        document.querySelectorAll('#year-filters button').forEach(btn => {
            btn.className = btn.innerText === year ? 'bg-white/20 px-3 py-1 rounded-full text-white' : 'bg-white/5 hover:bg-white/10 px-3 py-1 rounded-full text-gray-400';
        });
        renderMapAndData();
    }

    function renderMapAndData() {
        document.getElementById('flight-list').innerHTML = '';
        if (map.getStyle()) {
            map.getStyle().layers.forEach(l => { if (l.id.startsWith('r-')) map.removeLayer(l.id); });
            Object.keys(map.getStyle().sources).forEach(s => { if (s.startsWith('r-')) map.removeSource(s); });
        }

        let totalKm = 0, totalHours = 0, completedFlights = 0;
        let domCount = 0, intCount = 0, longCount = 0;
        let shortest = { route: '', dist: Infinity }, longest = { route: '', dist: -Infinity };
        let freq = { airports: {}, airlines: {}, routes: {}, countries: {}, aircrafts: {} };
        let routeFreq = {};
        
        let seatStats = {
            class: { 'Economy': 0, 'Premium Economy': 0, 'Business': 0, 'First Class': 0 },
            type: { 'Window': 0, 'Middle': 0, 'Aisle': 0 },
            exitRows: 0, validClasses: 0, validTypes: 0
        };

        // 🔥 圖表數據收集陣列
        let yearlyDist = {};
        let monthlyCount = new Array(12).fill(0);

        let filteredFlights = currentFlights.filter(f => {
            if(currentYearFilter === 'ALL') return true;
            if(!f.flight_date) return false;
            return f.flight_date.startsWith(currentYearFilter);
        });

        filteredFlights.forEach(f => {
            if(f.status && f.status.includes('完成')) {
                let r = [f.origin_code, f.dest_code].sort().join('-');
                routeFreq[r] = (routeFreq[r] || 0) + 1;
            }
        });
// ... (上面是 filteredFlights 的 filter 邏輯) ...

           // 🔥 絕對時間軸排序 (嚴格計算每一趟航班的起飛排名，拔除對 id 的依賴)
        const timelineFlights = [...filteredFlights].sort((a, b) => {
            let dateA = a.flight_date ? new Date(a.flight_date).getTime() : 0;
            let dateB = b.flight_date ? new Date(b.flight_date).getTime() : 0;
            return dateA - dateB; // 確保舊的排在最前面 (Ascending)
        });

        filteredFlights.forEach((f, i) => {
            const orig = airportDB[f.origin_code], dest = airportDB[f.dest_code];
            if(orig && dest) {
                const dist = turf.distance(orig.coords, dest.coords, {units: 'kilometers'});
                const routeName = `${f.origin_code} ✈️ ${f.dest_code}`;
                const routeKey = [f.origin_code, f.dest_code].sort().join('-');
                const freqCount = routeFreq[routeKey] || 1;
                
                const logoUrl = getAirlineLogoUrl(f.airline); 
                const airlineDisplay = f.airline ? (logoUrl ? `<img src="${logoUrl}" alt="${f.airline}" class="w-6 h-6 rounded-full object-contain bg-white/5 p-0.5 shrink-0">` : f.airline) : '';
                const dateBadge = f.flight_date ? `<span class="text-[10px] px-2 py-0.5 rounded-full border border-white/20 text-gray-300 mr-1">${f.flight_date.substring(0,4)}</span>` : '';

                document.getElementById('flight-list').innerHTML += `
                    <div class="bg-white/5 p-3 rounded-xl mb-2 flex items-center gap-3 group">
                        ${airlineDisplay} 
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-center mb-0.5">
                                <span class="font-bold tracking-wider truncate">${routeName}</span>
                                <div class="flex items-center gap-1 shrink-0 ml-2">
                                    ${dateBadge}
                                    <span class="text-[10px] font-bold border border-current px-2 py-0.5 rounded-full" style="color: ${getRouteColor(freqCount)}">${f.status||'已完成'}</span>
                                    <button onclick="editFlight(${f.id})" class="opacity-30 group-hover:opacity-100 hover:scale-110 transition-all text-xs ml-1">✏️</button>
                                    <button onclick="deleteFlight(${f.id})" class="opacity-30 group-hover:opacity-100 hover:scale-110 transition-all text-xs ml-1">🗑️</button>
                                </div>
                            </div>
                            <div class="text-[10px] text-gray-400 truncate">${[f.airline, f.flight_number].filter(Boolean).join(' ')} · ${f.aircraft_type||''} · ${formatTimeString(f.flight_hours)} · ${Math.round(dist)}km</div>
                        </div>
                    </div>`;

                // 🔥 新增：計算起飛時間差 (最舊的航班 delay=0，越新的越晚起飛，每架間隔 800 毫秒)
                
               
                let rank = timelineFlights.indexOf(f);
                let takeoffDelay = rank * 2000; // 
                
                drawAnimatedRoute(orig.coords, dest.coords, `r-${i}`, freqCount, f.status, takeoffDelay);

                if(f.status && f.status.includes('完成')) {
                    totalKm += dist;
                    if(f.flight_hours) totalHours += parseFloat(f.flight_hours);
                    
                    if(f.seat_class) { seatStats.class[f.seat_class] = (seatStats.class[f.seat_class] || 0) + 1; seatStats.validClasses++; }
                    if(f.seat_type) { seatStats.type[f.seat_type] = (seatStats.type[f.seat_type] || 0) + 1; seatStats.validTypes++; }
                    if(f.is_exit_row) { seatStats.exitRows++; }
                    
                    // 🔥 收集趨勢圖數據
                    if(f.flight_date) {
                        const y = f.flight_date.substring(0,4);
                        const m = parseInt(f.flight_date.substring(5,7)) - 1;
                        yearlyDist[y] = (yearlyDist[y] || 0) + dist;
                        monthlyCount[m]++;
                    }
                    
                    completedFlights++;
                    if(orig.country && dest.country && orig.country === dest.country) domCount++; else intCount++;
                    if(dist >= 4000) longCount++;

                    if(dist < shortest.dist) shortest = { route: routeName, dist: dist };
                    if(dist > longest.dist) longest = { route: routeName, dist: dist };
                    freq.airports[f.origin_code] = (freq.airports[f.origin_code]||0)+1;
                    freq.airports[f.dest_code] = (freq.airports[f.dest_code]||0)+1;
                    freq.routes[routeName] = (freq.routes[routeName]||0)+1;
                    if(f.airline) freq.airlines[f.airline] = (freq.airlines[f.airline]||0)+1;
                    if(f.aircraft_type) freq.aircrafts[f.aircraft_type] = (freq.aircrafts[f.aircraft_type]||0)+1;
                }
            }
        });

        document.getElementById('stat-dist').innerText = Math.round(totalKm).toLocaleString();
        document.getElementById('stat-flights').innerText = completedFlights;
        if(completedFlights > 0) {
            document.getElementById('sb-long-route').innerText = `${longest.route} (${Math.round(longest.dist)}km)`;
            document.getElementById('sb-short-route').innerText = `${shortest.route} (${Math.round(shortest.dist)}km)`;
            document.getElementById('pp-short-route').innerText = shortest.route;
            document.getElementById('pp-short-dist').innerText = `${Math.round(shortest.dist).toLocaleString()} km`;
            document.getElementById('pp-long-route').innerText = longest.route;
            document.getElementById('pp-long-dist').innerText = `${Math.round(longest.dist).toLocaleString()} km`;
        } else {
            document.getElementById('sb-long-route').innerText = '--';
            document.getElementById('sb-short-route').innerText = '--';
        }

        document.getElementById('pp-dist').innerText = Math.round(totalKm).toLocaleString();
        
        const earthRatio = (totalKm / 40075);
        const moonRatio = (totalKm / 384400);
        document.getElementById('pp-earth').innerText = earthRatio.toFixed(1);
        document.getElementById('pp-moon').innerText = moonRatio.toFixed(2);
        document.getElementById('pp-earth-bar').style.width = `${Math.min(earthRatio * 100, 100)}%`;
        document.getElementById('pp-moon-bar').style.width = `${Math.min(moonRatio * 100, 100)}%`;

        const avgHours = completedFlights ? (totalHours / completedFlights) : 0;
        const hrs = Math.floor(totalHours);
        const mins = Math.round((totalHours - hrs) * 60);
        
        document.getElementById('pp-time-main').innerHTML = `${hrs}<span class="text-2xl text-gray-500">h</span> ${mins}<span class="text-2xl text-gray-500">m</span>`;
        document.getElementById('pp-days').innerText = (totalHours / 24).toFixed(1);
        document.getElementById('pp-avg-time').innerText = `${Math.floor(avgHours)}h ${Math.round((avgHours-Math.floor(avgHours))*60)}m`;
        document.getElementById('pp-in-air').innerText = `${Math.floor(totalHours)}h ${Math.round((totalHours-Math.floor(totalHours))*60)}m`;

        document.getElementById('pp-total-flights-box').innerText = completedFlights;
        document.getElementById('pp-dom').innerText = domCount;
        document.getElementById('pp-int').innerText = intCount;
        document.getElementById('pp-long').innerText = longCount;

        const classColors = { 'Economy': '#bae6fd', 'Premium Economy': '#7dd3fc', 'Business': '#0284c7', 'First Class': '#082f49' };
        const typeColors = { 'Window': '#3b82f6', 'Middle': '#f59e0b', 'Aisle': '#22c55e' };
        const renderDonut = (data, colors, total, chartId, legendId, topNameId) => {
            let gradient = [], currentAngle = 0, legendHTML = '', topName = '--', maxVal = 0;
            for (let [key, val] of Object.entries(data)) {
                if (val > maxVal) { maxVal = val; topName = key; }
                if (val === 0) continue;
                let angle = (val / total) * 360;
                let color = colors[key] || '#888';
                gradient.push(`${color} ${currentAngle}deg ${currentAngle + angle}deg`);
                currentAngle += angle;
                let pct = Math.round((val/total)*100);
                legendHTML += `<div class="flex justify-between items-center"><div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full" style="background:${color}"></div><span class="text-gray-300">${key}</span></div><span class="font-bold">${pct}%</span></div>`;
            }
            if(total > 0) {
                document.getElementById(chartId).style.background = `conic-gradient(${gradient.join(', ')})`;
                document.getElementById(topNameId).innerText = topName;
                document.getElementById(legendId).innerHTML = legendHTML;
            }
        };

        renderDonut(seatStats.class, classColors, seatStats.validClasses, 'chart-class', 'legend-class', 'top-class-name');
        renderDonut(seatStats.type, typeColors, seatStats.validTypes, 'chart-seat', 'legend-seat', 'top-seat-name');
        document.getElementById('stat-exit-row').innerText = seatStats.exitRows;

       // 🔥 雙語升級版列表渲染引擎
        const renderList = (dataObj, containerId, colorClass, listType = 'normal') => {
            const sorted = Object.entries(dataObj).sort((a,b) => b[1]-a[1]);
            const container = document.getElementById(containerId);
            const maxVal = sorted.length ? sorted[0][1] : 1;
            
            container.innerHTML = sorted.slice(0, 10).map(item => {
                const name = item[0], count = item[1];
                let displayName = name;
                let logoDisplay = '';

                // 航空公司專屬處理 (抓取 Logo 與雙語字典)
                if(listType === 'airline') {
                    const logoUrl = getAirlineLogoUrl(name);
                    logoDisplay = logoUrl ? `<img src="${logoUrl}" alt="${name}" class="w-6 h-6 rounded-full object-contain bg-white/5 p-1 mr-3 shrink-0">` : '';
                    displayName = airlineDB[name] ? `${name} ${airlineDB[name]}` : name;
                }
                
                // 機場專屬處理 (IATA + 城市名稱/自訂雙語名稱)
                if(listType === 'airport' && airportDB[name]) {
                    displayName = `${name} ${airportDB[name].city}`;
                }

                const widthPercent = (count/maxVal)*100;
                return `
                    <div class="flex items-center text-sm">
                        ${logoDisplay}
                        <div class="w-40 sm:w-48 font-bold truncate pr-2 flex-shrink-0">${displayName}</div>
                        <div class="flex-1 flex items-center min-w-0">
                            <div class="${colorClass} h-6 rounded-r-md bar-fill flex items-center px-2 text-white font-bold text-xs" style="width: ${widthPercent}%">${count}</div>
                        </div>
                    </div>`;
            }).join('');
            return sorted.length;
        };

        // 綁定對應的顯示類型
        document.getElementById('pp-total-aircraft').innerText = renderList(freq.aircrafts, 'list-aircraft', 'bg-emerald-600', 'normal');
        document.getElementById('pp-total-routes').innerText = renderList(freq.routes, 'list-routes', 'bg-[#5e35b1]', 'normal');
        document.getElementById('pp-total-airports').innerText = renderList(freq.airports, 'list-airports', 'bg-[#7e57c2]', 'airport');
        document.getElementById('pp-total-airlines').innerText = renderList(freq.airlines, 'list-airlines', 'bg-sky-600', 'airline');

        // 🔥 機場熱力點與點擊 Popup 引擎
        let airportFeatures = [];
        for (let [code, count] of Object.entries(freq.airports)) {
            if (airportDB[code]) {
                airportFeatures.push({ type: 'Feature', properties: { code: code, count: count, name: airportDB[code].name, city: airportDB[code].city }, geometry: { type: 'Point', coordinates: airportDB[code].coords } });
            }
        }
        if(map.getSource('airports')) { map.getSource('airports').setData({ type: 'FeatureCollection', features: airportFeatures }); } 
        else {
            map.addSource('airports', { type: 'geojson', data: { type: 'FeatureCollection', features: airportFeatures } });
            map.addLayer({ id: 'airports-glow', type: 'circle', source: 'airports', paint: { 'circle-radius': ['*', ['get', 'count'], 4], 'circle-color': '#facc15', 'circle-opacity': 0.4, 'circle-blur': 1 } });
            map.addLayer({ id: 'airports-core', type: 'circle', source: 'airports', paint: { 'circle-radius': 4, 'circle-color': '#ffffff', 'circle-stroke-width': 1, 'circle-stroke-color': '#000' } });
            
            map.on('click', 'airports-core', (e) => {
                const props = e.features[0].properties;
                new mapboxgl.Popup({ closeButton: false }).setLngLat(e.features[0].geometry.coordinates)
                    .setHTML(`<div><strong class="text-lg">${props.code}</strong><div class="text-xs text-gray-400">${props.name}</div><div class="text-sm font-bold text-sky-400 mt-1">${props.city} · 造訪 ${props.count} 次</div></div>`).addTo(map);
            });
            map.on('mouseenter', 'airports-core', () => map.getCanvas().style.cursor = 'pointer');
            map.on('mouseleave', 'airports-core', () => map.getCanvas().style.cursor = '');
        }

        // 🔥 Chart.js 渲染引擎
        if(window.myYearlyChart) window.myYearlyChart.destroy();
        if(window.myMonthlyChart) window.myMonthlyChart.destroy();
        
        window.myYearlyChart = new Chart(document.getElementById('chart-yearly').getContext('2d'), {
            type: 'line',
            data: { labels: Object.keys(yearlyDist).sort(), datasets: [{ data: Object.keys(yearlyDist).sort().map(k => Math.round(yearlyDist[k])), borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', fill: true, tension: 0.4 }] },
            options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#888' }, grid: { display: false } }, y: { display: false } } }
        });

        window.myMonthlyChart = new Chart(document.getElementById('chart-monthly').getContext('2d'), {
            type: 'bar',
            data: { labels: ['J','F','M','A','M','J','J','A','S','O','N','D'], datasets: [{ data: monthlyCount, backgroundColor: '#facc15', borderRadius: 4 }] },
            options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#888' }, grid: { display: false } }, y: { display: false } } }
        });
    }

    map.on('load', async () => {
        document.getElementById('db-status').innerHTML = '<span class="text-yellow-400">載入引擎...</span>';
        await loadGlobalAirports();
        const { data: flights, error } = await supabaseClient.from('flights').select('*').order('flight_date', { ascending: false });
        if (error) return document.getElementById('db-status').innerHTML = '<span class="text-red-500">連線失敗</span>';
        document.getElementById('db-status').innerHTML = '<span class="text-green-400">系統上線</span>';
        
        currentFlights = flights; 

        const years = new Set();
        currentFlights.forEach(f => {
            if (f.flight_date) {
                years.add(f.flight_date.substring(0, 4));
            }
        });
        const sortedYears = Array.from(years).sort().reverse(); 
        
        let filterHTML = `<button onclick="filterByYear('ALL')" class="bg-white/20 px-3 py-1 rounded-full text-white">ALL</button>`;
        sortedYears.forEach(year => {
            filterHTML += `<button onclick="filterByYear('${year}')" class="bg-white/5 hover:bg-white/10 px-3 py-1 rounded-full text-gray-400">${year}</button>`;
        });
        document.getElementById('year-filters').innerHTML = filterHTML;

        let spinEnabled = true;
        function spinGlobe() {
            const zoom = map.getZoom();
            if (spinEnabled && !map.isZooming() && !map.isInteracting() && zoom < 5) {
                let distancePerSecond = 360 / 120;
                map.easeTo({ bearing: map.getBearing() + distancePerSecond * (1000/60), duration: 1000, easing: (n) => n });
            }
            requestAnimationFrame(spinGlobe);
        }
        spinGlobe();
        map.on('mousedown', () => spinEnabled = false);
        map.on('mouseup', () => spinEnabled = true);

        renderMapAndData(); 
    });

    }

    async function deleteFlight(id) {
        if(!confirm('確定要從護照中刪除這筆航班嗎？')) return;
        const { error } = await supabaseClient.from('flights').delete().eq('id', id);
        if(error) alert('刪除失敗，請檢查資料庫連線');
        else location.reload(); 
    }

    function editFlight(id) {
        const flight = currentFlights.find(f => f.id === id);
        if(!flight) return;
        editingFlightId = id; 
        
        document.getElementById('inp-date').value = flight.flight_date || ''; 
        document.getElementById('inp-origin').value = flight.origin_code || '';
        document.getElementById('inp-dest').value = flight.dest_code || '';
        document.getElementById('inp-airline').value = flight.airline || '';
        document.getElementById('inp-flight-number').value = flight.flight_number || '';
        document.getElementById('inp-seat').value = flight.seat || '';
        document.getElementById('inp-type').value = flight.aircraft_type || '';
        document.getElementById('inp-status').value = flight.status || '已完成';
        
        if(flight.flight_hours) {
            const h = Math.floor(flight.flight_hours);
            document.getElementById('inp-hh').value = h;
            document.getElementById('inp-mm').value = Math.round((flight.flight_hours - h) * 60);
        } else {
            document.getElementById('inp-hh').value = '';
            document.getElementById('inp-mm').value = '';
        }
        
        document.getElementById('inp-seat-class').value = flight.seat_class || '';
        document.getElementById('inp-seat-type').value = flight.seat_type || '';
        document.getElementById('inp-exit-row').checked = flight.is_exit_row || false;

        document.getElementById('submitBtn').innerText = '更新紀錄';
        document.querySelector('#addFlightModal h2').innerText = '編輯航班紀錄';
        toggleModal('addFlightModal');
    }

    async function submitFlight(e) {
        e.preventDefault();
        const originInput = document.getElementById('inp-origin').value.toUpperCase();
        const destInput = document.getElementById('inp-dest').value.toUpperCase();

        if (!airportDB[originInput]) return alert(`找不到出發地代碼：${originInput}`);
        if (!airportDB[destInput]) return alert(`找不到目的地代碼：${destInput}`);

        const btn = document.getElementById('submitBtn');
        btn.innerText = '處理中...'; 
        btn.disabled = true;

        let hh = parseInt(document.getElementById('inp-hh').value) || 0;
        let mm = parseInt(document.getElementById('inp-mm').value) || 0;
        let flightHours = (hh > 0 || mm > 0) ? (hh + (mm / 60)) : null;

        if (!flightHours) {
            const distKm = turf.distance(airportDB[originInput].coords, airportDB[destInput].coords, {units: 'kilometers'});
            flightHours = parseFloat(((distKm / 850) + 0.5).toFixed(1));
        }

        const payload = {
            flight_date: document.getElementById('inp-date').value || null, 
            origin_code: originInput, dest_code: destInput,
            airline: document.getElementById('inp-airline').value || null,
            flight_number: document.getElementById('inp-flight-number').value || null,
            seat: document.getElementById('inp-seat').value.toUpperCase() || null,
            seat_class: document.getElementById('inp-seat-class').value || null,
            seat_type: document.getElementById('inp-seat-type').value || null,
            is_exit_row: document.getElementById('inp-exit-row').checked,
            aircraft_type: document.getElementById('inp-type').value || null,
            flight_hours: flightHours, status: document.getElementById('inp-status').value
        };

        let error;
        if (editingFlightId) {
            const res = await supabaseClient.from('flights').update(payload).eq('id', editingFlightId);
            error = res.error;
        } else {
            const res = await supabaseClient.from('flights').insert([payload]);
            error = res.error;
        }

        if (error) { 
            alert('寫入/更新失敗'); 
            btn.disabled = false; 
            btn.innerText = editingFlightId ? '更新紀錄' : '寫入護照';
        } else { 
            location.reload(); 
        }
    }

    // 🔥 替換成這行 (新增 delay 參數)
    function drawAnimatedRoute(origin, destination, routeId, freqCount, status, delay = 0) {
        let lineColor = (status && status.includes('計畫')) ? '#6b7280' : getRouteColor(freqCount);
        const route = turf.greatCircle(origin, destination);
        const lineDistance = turf.length(route);
        const arcCoordinates = [];
        for (let i = 0; i <= lineDistance; i += lineDistance / 250) arcCoordinates.push(turf.along(route, i).geometry.coordinates);
        arcCoordinates.push(destination); 

        map.addSource(routeId, { 'type': 'geojson', 'data': { 'type': 'Feature', 'properties': {}, 'geometry': { 'type': 'LineString', 'coordinates': [arcCoordinates[0], arcCoordinates[0]] } } });
        map.addLayer({ 'id': `${routeId}-line`, 'type': 'line', 'source': routeId, 'layout': { 'line-join': 'round', 'line-cap': 'round' }, 'paint': { 'line-color': lineColor, 'line-width': 3, 'line-opacity': 0.5 } });

      // 🔥 動態飛機 Marker (修正 Mapbox 衝突)
        const elContainer = document.createElement('div');
        const planeIcon = document.createElement('div');
        planeIcon.innerHTML = '✈️';
        planeIcon.style.fontSize = '18px';
        planeIcon.style.transition = 'transform 0.1s linear'; // 讓旋轉更滑順
        elContainer.appendChild(planeIcon);
        
        const planeMarker = new mapboxgl.Marker({element: elContainer}).setLngLat(arcCoordinates[0]).addTo(map);

        let animCounter = 1; 
        function animate() {
            if (animCounter < arcCoordinates.length) {
                const currentCoords = arcCoordinates.slice(0, animCounter + 1);
                if(map.getSource(routeId)) {
                    map.getSource(routeId).setData({ 'type': 'FeatureCollection', 'features': [ { 'type': 'Feature', 'geometry': { 'type': 'LineString', 'coordinates': currentCoords } } ] });
                }
                
                // 計算旋轉角度
                const p1 = arcCoordinates[animCounter - 1];
                const p2 = arcCoordinates[animCounter];
                const bearing = turf.bearing(p1, p2);
                planeMarker.setLngLat(p2);
                
                // 🚨 關鍵修復：只旋轉內部的 planeIcon，不碰外層的 Mapbox 定位容器
                planeIcon.style.transform = `rotate(${bearing - 45}deg)`; 

                animCounter++;
                requestAnimationFrame(animate);
            } else {
                planeMarker.remove(); 
            }
        }
       // 🔥 替換成這行 (套用我們傳進來的時間軸)
        setTimeout(() => animate(), delay + 1300); 
    }
</script>
